services:
  - type: web
    name: gounion-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker fastapi_server.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: SET_IN_RENDER_DASHBOARD
      - key: SUPABASE_URL
        value: https://mswnviziobmmpsrwckjd.supabase.co
      - key: SUPABASE_SERVICE_KEY
        value: SET_IN_RENDER_DASHBOARD
      - key: ALLOWED_ORIGINS
        value: "https://gounion-frontend.onrender.com,https://localhost,capacitor://localhost,http://localhost,https://gounion-download.vercel.app"
