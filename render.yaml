services:
  - type: web
    name: gounion-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker fastapi_server.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: PORT
        value: 10000
      - key: DATABASE_URL
      - key: SUPABASE_URL
      - key: SUPABASE_SERVICE_KEY
      - key: ALLOWED_ORIGINS

  - type: web
    name: gounion-frontend
    runtime: static
    rootDir: gounion-remake
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://gounion-backend.onrender.com
