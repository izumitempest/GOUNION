<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Inter', -apple-system, sans-serif; background: #050505; color: #f5f5f0; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 60px auto; background: #121212; border: 1px solid rgba(245,245,240,0.1); border-radius: 24px; padding: 48px; text-align: center; }
    .logo { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 32px; color: #fff; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
    p { font-size: 16px; line-height: 1.6; color: #a3a3a3; margin-bottom: 40px; }
    .button { background: #fff; color: #000 !important; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }
    .footer { margin-top: 48px; font-size: 12px; color: #444; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">GOUNION</div>
    <h1>Initialize Profile</h1>
    <p>Welcome to the collective. To finalize your authentication and activate your campus legacy, please confirm your identity below.</p>
    <a href="{{ .ConfirmationURL }}" class="button">Confirm Identity</a>
    <div class="footer">Securely Encrypted &bull; Boundless Networking</div>
  </div>
</body>
</html>
